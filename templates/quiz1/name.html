<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HK Cmp Pvt Limited - Ingestion Portal</title>
    <style>
        body {
            background: radial-gradient(circle at 50% 50%, #090d16 0%, #020408 100%);
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .portal-box {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background: rgba(15, 23, 42, 0.75);
            border: 2px solid rgba(0, 242, 254, 0.2);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.15);
            text-align: center;
        }

        h1 {
            font-size: 2em;
            font-weight: 900;
            background: linear-gradient(90deg, #00f2fe, #00e676);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(0, 242, 254, 0.25);
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 18px;
        }

        label {
            color: #94a3b8;
            font-weight: 700;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 8px;
        }
        
        input[type="text"], select {
            width: 100%;
            padding: 12px 16px;
            background-color: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            color: #ffffff !important;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #00f2fe !important;
            box-shadow: 0 0 12px rgba(0, 242, 254, 0.4) !important;
        }

        .btn-stack {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 25px;
        }

        button {
            padding: 14px;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }

        .btn-major {
            background: linear-gradient(90deg, #00e676, #00c853);
            box-shadow: 0 4px 14px rgba(0, 230, 118, 0.3);
        }

        .btn-practice {
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            box-shadow: 0 4px 14px rgba(0, 242, 254, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

<div class="portal-box">
    <h1>HK Cmp Pvt Limited</h1>
    <p style="color: #64748b; margin-top: -15px; margin-bottom: 25px; font-weight: 600;">Secure Assessment Evaluation Matrix</p>
    
    <form method="post" id="portalForm">
        {% csrf_token %}
        
        <div class="input-group">
            <label>👤 Candidate Name</label>
            <input type="text" name="name" placeholder="Enter your full identity name..." required>
        </div>

        <div class="input-group">
            <label>📚 Choose Target Course Topic</label>
            <select name="course_topic">
                <option value="General Knowledge">General Knowledge</option>
                <option value="Computer Science">Computer Science & Technology</option>
                <option value="Mathematics">Advanced Mathematics</option>
                <option value="Natural Science">Natural Space Science</option>
                <option value="Social Science">Social Science & History</option>
                <option value="Sports & Media">Sports & Entertainment</option>
            </select>
        </div>

        <div class="btn-stack">
            <button type="submit" onclick="setMode('major')" class="btn-major">🚀 Launch Main 30-Question Exam (30 Mins) ➔</button>
            <button type="submit" onclick="setMode('easy_moderate')" class="btn-practice">🛠️ Launch 20-Question Practice Arena (Easy-Mod) ➔</button>
        </div>
    </form>
</div>

<script>
    function setMode(mode) {
        const form = document.getElementById('portalForm');
        form.action = "/start-quiz/" + mode + "/";
    }
</script>

</body>
</html>
